name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.8

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan.binary | tee plan_output.txt
        continue-on-error: true

      - name: Upload plan as evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_number }}
          path: |
            plan_output.txt
            tfplan.binary
          retention-days: 30

      - name: Flag drift if changes detected
        run: |
          if grep -qE "Plan: 0 to add, 0 to change, 0 to destroy" plan_output.txt; then
            echo "No drift detected."
          elif grep -q "No changes." plan_output.txt; then
            echo "No drift detected."
          else
            echo "::warning::Drift detected in infrastructure. Review the plan artifact."
            SUMMARY=$(grep -E "^Plan:" plan_output.txt || echo "unable to parse plan summary")
            echo "Summary: $SUMMARY"
          fi
